# Climate-module cities (per climate_location_module.md §2.4, §3.4, §7.2)
#
# Used by sdg.weather.* to fetch real Open-Meteo data and apply the
# T_fab / H_fab / P_fab transfer functions.
#
# Defaults are global model constants identical for all 10 cities.

defaults:
  T_set: 22.0          # °C, climate setpoint indoors
  T_ext_ref: 20.0      # °C, exterior reference temperature
  H_set: 45.0          # %, humidity setpoint indoors
  H_ext_ref: 60.0      # %, exterior reference humidity
  T_fab_clip: [18.0, 30.0]
  H_fab_clip: [30.0, 70.0]

cities:
